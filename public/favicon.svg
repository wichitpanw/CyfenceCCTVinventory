<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E2330"/>
      <stop offset="100%" stop-color="#0F1218"/>
    </linearGradient>

    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3F4756"/>
      <stop offset="100%" stop-color="#1A1F26"/>
    </linearGradient>

    <!-- Glass Top Face Gradient -->
    <linearGradient id="glassTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4FACFE" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Glass Top Inner Glow -->
    <linearGradient id="glassTopGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00F2FE" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Left Face Gradient (Dark Metal) -->
    <linearGradient id="metalLeft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#232938"/>
      <stop offset="100%" stop-color="#131720"/>
    </linearGradient>

    <!-- Right Face Gradient (Dark Metal) -->
    <linearGradient id="metalRight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1E29"/>
      <stop offset="100%" stop-color="#0C0E14"/>
    </linearGradient>

    <!-- Cyan Glow Filter for Neon Elements -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- 1. Squircle Container (Apple Style) -->
  <rect x="24" y="24" width="464" height="464" rx="108" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="6" filter="url(#shadow)" />

  <!-- Subtle Radial Glow Behind the Icon -->
  <circle cx="256" cy="270" r="150" fill="#00F2FE" opacity="0.08" filter="url(#neonGlow)"/>

  <!-- 2. Isometric Warehouse/Inventory Safe Box (Center X=256, Y=260) -->
  <g transform="translate(0, -10)">
    <!-- Base Shadow under the Box -->
    <polygon points="120,335 256,410 392,335 256,260" fill="#000000" opacity="0.4" filter="url(#neonGlow)"/>

    <!-- Left Face (Server Rack / Network Grid) -->
    <polygon points="130,210 256,280 256,400 130,330" fill="url(#metalLeft)" stroke="#2D3548" stroke-width="1.5"/>

    <!-- Left Face Horizontal Rack Lights -->
    <!-- Rack 1 -->
    <path d="M 155,237 L 231,279" stroke="#00F2FE" stroke-width="3" stroke-linecap="round" filter="url(#neonGlow)" opacity="0.85"/>
    <circle cx="170" cy="245" r="4" fill="#39FF14" filter="url(#neonGlow)"/> <!-- Status Green LED -->
    <circle cx="215" cy="270" r="4" fill="#00F2FE" filter="url(#neonGlow)"/> <!-- Status Cyan LED -->

    <!-- Rack 2 -->
    <path d="M 155,267 L 231,309" stroke="#00F2FE" stroke-width="3" stroke-linecap="round" filter="url(#neonGlow)" opacity="0.85"/>
    <circle cx="170" cy="275" r="4" fill="#39FF14" filter="url(#neonGlow)"/> <!-- Status Green LED -->
    <circle cx="192" cy="287" r="4" fill="#FF3131" filter="url(#neonGlow)"/> <!-- Alert Red LED -->
    <circle cx="215" cy="300" r="4" fill="#00F2FE" filter="url(#neonGlow)"/> <!-- Status Cyan LED -->

    <!-- Rack 3 -->
    <path d="M 155,297 L 231,339" stroke="#00F2FE" stroke-width="3" stroke-linecap="round" filter="url(#neonGlow)" opacity="0.85"/>
    <circle cx="170" cy="305" r="4" fill="#39FF14" filter="url(#neonGlow)"/> <!-- Status Green LED -->
    <circle cx="215" cy="330" r="4" fill="#00F2FE" filter="url(#neonGlow)"/> <!-- Status Cyan LED -->


    <!-- Right Face (CCTV / Security Grid) -->
    <polygon points="256,280 382,210 382,330 256,400" fill="url(#metalRight)" stroke="#242B3A" stroke-width="1.5"/>

    <!-- CCTV Camera graphic on Right Face (Skewed isometrically) -->
    <!-- Stylized Camera Lens Circle -->
    <path d="M 285,280 C 285,250 353,212 353,242 C 353,272 285,310 285,280 Z" fill="none" stroke="#4FACFE" stroke-width="2.5" stroke-dasharray="6,4" opacity="0.5"/>
    
    <!-- Camera Lens Core (Neon ring and lens) -->
    <path d="M 300,285 C 290,265 330,242 340,262 C 350,282 310,305 300,285 Z" fill="#131720" stroke="#00F2FE" stroke-width="4" filter="url(#neonGlow)"/>
    <circle cx="320" cy="273" r="8" fill="#4FACFE" filter="url(#neonGlow)"/>
    <circle cx="317" cy="270" r="3" fill="#FFFFFF"/> <!-- Lens Reflection -->

    <!-- Camera Stand/Bracket lines -->
    <path d="M 330,262 L 350,245" stroke="#4FACFE" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 350,245 L 360,250" stroke="#4FACFE" stroke-width="2.5" stroke-linecap="round"/>


    <!-- Top Face (Glowing Glass Cover) -->
    <polygon points="256,136 382,206 256,276 130,206" fill="url(#glassTop)" stroke="#FFFFFF" stroke-width="2.5" filter="url(#neonGlow)"/>
    
    <!-- Top Face Gloss/Refraction highlights -->
    <polygon points="256,140 376,206 256,272 136,206" fill="url(#glassTopGlow)" stroke="none"/>
    <path d="M 145,206 L 256,144 L 367,206" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

    <!-- Holographic Floating Elements Above the Box -->
    <!-- Network Node 1 (Center Top) -->
    <circle cx="256" cy="95" r="9" fill="#00F2FE" filter="url(#neonGlow)"/>
    <!-- Connecting Laser Rays -->
    <line x1="256" y1="95" x2="256" y2="136" stroke="#00F2FE" stroke-width="2" stroke-dasharray="4,4" filter="url(#neonGlow)"/>
    
    <!-- Floating Package/Item outline representing Inventory -->
    <polygon points="230,85 256,98 282,85 256,72" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>
    <line x1="230" y1="85" x2="230" y2="105" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>
    <line x1="256" y1="98" x2="256" y2="118" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>
    <line x1="282" y1="85" x2="282" y2="105" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>
    <polygon points="230,105 256,118 282,105 256,92" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>
  </g>
</svg>
